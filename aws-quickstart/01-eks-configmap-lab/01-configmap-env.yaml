apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: configmap-demo
  labels:
    app: demo-app
data:
  # Database configuration
  database_url: "postgres://localhost:5432/myapp"
  database_pool_size: "10"
  
  # Feature flags
  feature_flag: "false"
  enable_caching: "true"
  
  # Application settings
  log_level: "info"
  max_connections: "100"
  timeout_seconds: "30"
  
  # API configuration
  api_version: "v1"
  api_endpoint: "https://api.example.com"
