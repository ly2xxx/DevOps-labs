# GitLab CI/CD Pipeline for Token Rotation
# This pipeline automatically rotates GitLab project access tokens and stores them in HashiCorp Vault

stages:
  - validate
  - rotate
  - cleanup
  - notify

# Global variables
variables:
  PYTHON_VERSION: "3.11"
  GITLAB_TOKEN_SCOPES: "api,read_repository,write_repository"
  GITLAB_TOKEN_EXPIRY_DAYS: "90"
  DRY_RUN: "false"
  REVOKE_OLD_TOKEN: "false"  # Set to "true" to auto-revoke old tokens

# Only run on scheduled pipelines or manual triggers
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: manual

# Template for Python jobs
.python_base:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip

# ==================== VALIDATE STAGE ====================

validate:environment:
  extends: .python_base
  stage: validate
  script:
    - echo "🔍 Validating environment configuration..."
    
    - |
      # Check required environment variables
      REQUIRED_VARS="VAULT_ADDR VAULT_TOKEN GITLAB_TOKEN CI_PROJECT_ID"
      MISSING_VARS=""
      
      for var in $REQUIRED_VARS; do
        if [ -z "${!var}" ]; then
          MISSING_VARS="$MISSING_VARS $var"
        fi
      done
      
      if [ -n "$MISSING_VARS" ]; then
        echo "❌ Missing required environment variables:$MISSING_VARS"
        exit 1
      fi
    
    - echo "✅ All required environment variables present"
    
    - |
      # Test Vault connection
      python3 << 'EOF'
      import hvac
      import os
      import sys
      
      try:
          client = hvac.Client(url=os.getenv('VAULT_ADDR'), token=os.getenv('VAULT_TOKEN'))
          if not client.is_authenticated():
              print("❌ Vault authentication failed")
              sys.exit(1)
          print("✅ Vault connection successful")
      except Exception as e:
          print(f"❌ Vault connection failed: {e}")
          sys.exit(1)
      EOF
    
    - |
      # Test GitLab connection
      python3 << 'EOF'
      import gitlab
      import os
      import sys
      
      try:
          gl = gitlab.Gitlab('https://gitlab.com', private_token=os.getenv('GITLAB_TOKEN'))
          gl.auth()
          print(f"✅ GitLab connection successful (user: {gl.user.username})")
      except Exception as e:
          print(f"❌ GitLab connection failed: {e}")
          sys.exit(1)
      EOF
    
    - echo "✅ Environment validation complete"
  
  artifacts:
    reports:
      dotenv: validate.env
    expire_in: 1 hour

# ==================== ROTATE STAGE ====================

rotate:token:
  extends: .python_base
  stage: rotate
  dependencies:
    - validate:environment
  script:
    - echo "🔄 Starting token rotation process..."
    
    - |
      # Export environment variables for rotation script
      export GITLAB_URL="https://gitlab.com"
      export GITLAB_PROJECT_ID="${CI_PROJECT_ID}"
      export GITLAB_TOKEN_SCOPES="${GITLAB_TOKEN_SCOPES}"
      export GITLAB_TOKEN_EXPIRY_DAYS="${GITLAB_TOKEN_EXPIRY_DAYS}"
      export DRY_RUN="${DRY_RUN}"
      export REVOKE_OLD_TOKEN="${REVOKE_OLD_TOKEN}"
      export CI_PIPELINE_URL="${CI_PIPELINE_URL}"
      export CI_COMMIT_SHA="${CI_COMMIT_SHA}"
      export CI_COMMIT_BRANCH="${CI_COMMIT_BRANCH}"
    
    - |
      # Run rotation script
      python rotate_token.py 2>&1 | tee rotation.log
      EXIT_CODE=${PIPESTATUS[0]}
      
      if [ $EXIT_CODE -ne 0 ]; then
        echo "❌ Token rotation failed with exit code $EXIT_CODE"
        exit $EXIT_CODE
      fi
    
    - echo "✅ Token rotation completed successfully"
    
    - |
      # Extract new token ID for artifacts
      NEW_TOKEN_ID=$(grep "Created new GitLab token:" rotation.log | sed 's/.*: //')
      echo "NEW_TOKEN_ID=$NEW_TOKEN_ID" >> rotation.env
      echo "ROTATION_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> rotation.env
  
  artifacts:
    reports:
      dotenv: rotation.env
    paths:
      - rotation.log
    expire_in: 30 days
  
  retry:
    max: 2
    when:
      - api_failure
      - runner_system_failure

# ==================== CLEANUP STAGE ====================

cleanup:old_tokens:
  extends: .python_base
  stage: cleanup
  dependencies:
    - rotate:token
  rules:
    - if: '$REVOKE_OLD_TOKEN == "true"'
  script:
    - echo "🧹 Cleaning up old tokens..."
    
    - |
      # Optional: Add cleanup logic for tokens older than X days
      python3 << 'EOF'
      import gitlab
      import os
      from datetime import datetime, timedelta
      
      gl = gitlab.Gitlab('https://gitlab.com', private_token=os.getenv('GITLAB_TOKEN'))
      project = gl.projects.get(os.getenv('CI_PROJECT_ID'))
      
      # Delete tokens older than 180 days
      cutoff = datetime.now() - timedelta(days=180)
      deleted_count = 0
      
      for token in project.access_tokens.list(all=True):
          created_at = datetime.fromisoformat(token.created_at.replace('Z', '+00:00').replace('+00:00', ''))
          if created_at < cutoff and token.name.startswith('auto-rotated-'):
              try:
                  token.delete()
                  print(f"🗑️ Deleted old token: {token.name} (created {token.created_at})")
                  deleted_count += 1
              except Exception as e:
                  print(f"⚠️ Could not delete token {token.name}: {e}")
      
      print(f"✅ Cleanup complete. Deleted {deleted_count} old tokens.")
      EOF
  
  allow_failure: true

# ==================== NOTIFY STAGE ====================

notify:success:
  stage: notify
  image: alpine:latest
  dependencies:
    - rotate:token
  rules:
    - when: on_success
  script:
    - echo "✅ Token rotation pipeline completed successfully!"
    - echo "📊 Pipeline URL $CI_PIPELINE_URL"
    - echo "🔑 New token created and stored in Vault"
    - echo "⏰ Next rotation scheduled for $(date -d '+7 days' '+%Y-%m-%d')"
    
    # Optional: Send notification to Slack/email
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        apk add --no-cache curl
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"✅ GitLab Token Rotation Successful\n Project: $CI_PROJECT_NAME\n Token ID: $NEW_TOKEN_ID\n Pipeline: $CI_PIPELINE_URL\"}" \
          $SLACK_WEBHOOK_URL
      fi

notify:failure:
  stage: notify
  image: alpine:latest
  rules:
    - when: on_failure
  script:
    - echo "❌ Token rotation pipeline FAILED!"
    - echo "📊 Pipeline URL $CI_PIPELINE_URL"
    - echo "🔍 Check pipeline logs for details"
    - echo "⚠️ Manual intervention may be required"
    
    # Optional: Send alert notification
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        apk add --no-cache curl
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"❌ GitLab Token Rotation FAILED\n Project: $CI_PROJECT_NAME\n Pipeline: $CI_PIPELINE_URL\n Action Required: Check logs and retry manually\"}" \
          $SLACK_WEBHOOK_URL
      fi
