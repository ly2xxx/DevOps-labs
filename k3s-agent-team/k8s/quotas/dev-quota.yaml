apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: dev-agents
spec:
  hard:
    # CPU limits - developers need more resources
    requests.cpu: "4"      # Total requested CPU
    limits.cpu: "8"        # Total CPU limit
    
    # Memory limits
    requests.memory: 8Gi   # Total requested memory
    limits.memory: 16Gi    # Total memory limit
    
    # Pod limits
    pods: "8"              # Max 8 developer agents at once
    
    # Storage
    persistentvolumeclaims: "3"
    requests.storage: 50Gi
