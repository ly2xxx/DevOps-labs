apiVersion: v1
kind: ResourceQuota
metadata:
  name: test-quota
  namespace: test-agents
spec:
  hard:
    # CPU limits
    requests.cpu: "2"      # Total requested CPU
    limits.cpu: "4"        # Total CPU limit
    
    # Memory limits
    requests.memory: 4Gi   # Total requested memory
    limits.memory: 8Gi     # Total memory limit
    
    # Pod limits
    pods: "6"              # Max 6 tester agents at once
    
    # Storage
    persistentvolumeclaims: "2"
    requests.storage: 30Gi
