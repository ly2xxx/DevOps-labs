apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-isolation
  namespace: dev-agents
spec:
  podSelector:
    matchLabels:
      role: developer
  
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from coordinator
  - from:
    - namespaceSelector:
        matchLabels:
          role: coordinator
    ports:
    - protocol: TCP
      port: 8080
  
  # Allow from same namespace
  - from:
    - podSelector:
        matchLabels:
          role: developer
  
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
  
  # Allow external API calls + Git repos
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 22     # SSH for Git
  
  # Allow to coordinator
  - to:
    - namespaceSelector:
        matchLabels:
          role: coordinator
  
  # Allow to storage
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 2049
