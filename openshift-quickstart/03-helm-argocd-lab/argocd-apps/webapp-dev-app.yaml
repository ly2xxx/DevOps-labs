# ArgoCD Application for DEV environment
# Apply this to deploy webapp-dev via GitOps

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-dev
  namespace: argocd
  labels:
    environment: development
spec:
  project: default
  
  # Source: Where ArgoCD pulls from
  source:
    repoURL: https://github.com/YOUR_USERNAME/argocd-demo-app.git  # ⚠️ UPDATE THIS!
    targetRevision: HEAD  # Or specific branch/tag
    path: helm/webapp
    helm:
      valueFiles:
        - values-dev.yaml
  
  # Destination: Where to deploy
  destination:
    server: https://kubernetes.default.svc  # In-cluster
    namespace: webapp-dev
  
  # Sync Policy: How to sync
  syncPolicy:
    automated:
      prune: true       # Delete resources removed from Git
      selfHeal: true    # Revert manual changes
    syncOptions:
      - CreateNamespace=true  # Auto-create namespace
  
  # Health checks (optional)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore manual replica changes temporarily (optional)
