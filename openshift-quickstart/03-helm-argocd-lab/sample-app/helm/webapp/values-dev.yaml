# Development environment overrides (GitOps)

replicaCount: 1

environment: development

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: PORT
    value: "8080"
  - name: ENVIRONMENT
    value: "development"
  - name: APP_NAME
    value: "webapp-dev-gitops"
  - name: VERSION
    value: "1.0.0"
